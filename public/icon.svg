<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- キャンバス全体の背景（わずかに超微細な青みがかった白の縦グラデーションで高級感を演出） -->
  <rect width="512" height="512" fill="url(#bg-subtle-grad)" />
  
  <defs>
    <!-- 背景用の微細なグラデーション -->
    <linearGradient id="bg-subtle-grad" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4FAFD"/>
    </linearGradient>

    <!-- 下部の丘（トラック）用グラデーション（ミントグリーンから青へ） -->
    <linearGradient id="track-grad" x1="0" y1="400" x2="512" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A7F3D0"/> <!-- Mint green -->
      <stop offset="0.5" stop-color="#6EE7B7"/>
      <stop offset="1" stop-color="#3B82F6"/> <!-- Blue -->
    </linearGradient>

    <!-- ランナー本体用の縦グラデーション（肩の青から足元のシアンへ） -->
    <linearGradient id="runner-grad" x1="256" y1="100" x2="256" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/> <!-- Royal Blue -->
      <stop offset="0.6" stop-color="#38BDF8"/> <!-- Sky Blue -->
      <stop offset="1" stop-color="#22D3EE"/> <!-- Cyan -->
    </linearGradient>

    <!-- スピードライン上用グラデーション（透明から青へ） -->
    <linearGradient id="speed-top" x1="80" y1="0" x2="210" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.25"/>
    </linearGradient>

    <!-- スピードライン中用グラデーション（透明からミントグリーンへ） -->
    <linearGradient id="speed-mid" x1="60" y1="0" x2="190" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10B981" stop-opacity="0"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0.25"/>
    </linearGradient>

    <!-- スピードライン下用グラデーション（透明からシアンへ） -->
    <linearGradient id="speed-low" x1="90" y1="0" x2="170" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- 💨 背後のスピードスリット（3本の角丸ライン、左から右へフェードイン） -->
  <g stroke-linecap="round" stroke-width="12" fill="none">
    <line x1="80" y1="185" x2="210" y2="185" stroke="url(#speed-top)" />
    <line x1="60" y1="212" x2="190" y2="212" stroke="url(#speed-mid)" />
    <line x1="90" y1="239" x2="170" y2="239" stroke="url(#speed-low)" />
  </g>

  <!-- ⛰️ 下部のトラック（グラデーションの丘） -->
  <path d="M 0 350 C 140 310, 370 290, 512 305 L 512 512 L 0 512 Z" fill="url(#track-grad)" opacity="0.85" />
  
  <!-- 🛣️ トラックの白い躍動的なレーン境界線 -->
  <path d="M -10 365 C 140 325, 370 305, 522 318" stroke="white" stroke-width="6" fill="none" opacity="0.75" stroke-linecap="round" />

  <!-- 🏃‍♂️ ランナー（躍動感溢れるプロフェッショナルなピクトグラム） -->
  <!-- 頭部 -->
  <circle cx="325" cy="120" r="19" fill="#2563EB" />
  
  <!-- 胴体と手足（滑らかな太いストロークで関節とアライメントを表現） -->
  <g stroke="url(#runner-grad)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- 左腕（後腕：後ろに引き、肘で曲がる） -->
    <path d="M 275 160 L 240 145 L 210 170" />
    
    <!-- 左脚（後脚：後ろに力強くほぼ真っ直ぐ伸びる） -->
    <path d="M 220 225 L 180 275 L 145 310" />
    
    <!-- 胴体（脊椎・体幹：前傾姿勢） -->
    <path d="M 275 160 L 220 225" />
    
    <!-- 右脚（前脚：前方に高く上がり、膝で折り曲げられる） -->
    <path d="M 220 225 L 285 240 L 235 278" />

    <!-- 右腕（前腕：前方に伸ばし、肘で少し上がる） -->
    <path d="M 275 160 L 320 185 L 360 162" />
  </g>

  <!-- 🔤 テキスト情報（TUAT RUNNING STATS、文字間隔の広い高級サンセリフ） -->
  <text x="256" y="418" font-family="'Plus Jakarta Sans', 'Inter', 'Helvetica Neue', sans-serif" font-size="46" font-weight="800" fill="#0E2A64" text-anchor="middle" letter-spacing="12">TUAT</text>
  <text x="256" y="454" font-family="'Plus Jakarta Sans', 'Inter', 'Helvetica Neue', sans-serif" font-size="13" font-weight="700" fill="#3A5285" text-anchor="middle" letter-spacing="6.5">RUNNING STATS</text>
</svg>
