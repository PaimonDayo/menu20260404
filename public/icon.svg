<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- iOS-style vibrant gradient background -->
  <rect width="512" height="512" fill="url(#ios-blue-grad)" />
  
  <defs>
    <!-- Premium Apple-like Blue Gradient (top-left to bottom-right) -->
    <linearGradient id="ios-blue-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#47C0FF"/>
      <stop offset="1" stop-color="#0066FF"/>
    </linearGradient>
  </defs>

  <!-- Minimalist, perfectly balanced, thick runner glyph -->
  <!-- Stroke width is thick and bold, perfectly centered mathematically and optically -->
  <g stroke="#FFFFFF" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Back Arm (Right Arm) -->
    <path d="M 296 200 L 246 175 L 196 230" />
    
    <!-- Back Leg (Left Leg) -->
    <path d="M 266 320 L 206 360 L 136 390" />
    
    <!-- Torso -->
    <path d="M 296 200 L 266 320" />
    
    <!-- Front Leg (Right Leg) -->
    <path d="M 266 320 L 336 280 L 356 360" />

    <!-- Front Arm (Left Arm) -->
    <path d="M 296 200 L 346 235 L 376 170" />
  </g>
  
  <!-- Head -->
  <circle cx="326" cy="120" r="36" fill="#FFFFFF" />
</svg>
